name: CI
on: [push]  
jobs:
  sast_scan:
   name: Bandit Scan
   runs-on: ubuntu-latest

   steps:
    - name: Checkout code
     uses: action/checkout@v2

    - name: install python 
     uses: actions/setup-python@v2
     with:
      python-version:3.8
      - name: install Bandit
      run: pip install bandit

      
